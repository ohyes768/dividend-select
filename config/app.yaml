# dividend-select 服务配置

app:
  # 服务器配置
  server:
    host: "0.0.0.0"
    port: 8092

  # 数据配置
  data:
    csv_file: "data/近3年股息率汇总.csv"
    encoding: "utf-8-sig"

  # 日志配置
  logging:
    level: "INFO"
    console: true
    file: true
    dir: "logs"

  # 分页默认配置
  pagination:
    default_page_size: 50
    max_page_size: 500